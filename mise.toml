[tools]
go = "1.26"

[env]
AWS_REGION = "ap-northeast-1"
# Load local overrides from .env (DYNAMODB_TABLE_NAME etc.)
_.file = ".env"

# ── Development ───────────────────────────────────────────────────────────────

[tasks.build]
description = "Build idproxy binary"
run = "go build ./cmd/idproxy/..."

[tasks.test]
description = "Run all tests"
run = "go test -race ./..."

[tasks."test:integration"]
description = "Run integration tests"
run = "go test -race -tags=integration ./..."

[tasks."test:e2e"]
description = "E2E テスト（fake az を使う）"
run = """
go build -o ./idproxy ./cmd/idproxy
IDPROXY_E2E=1 go test -tags=e2e -v ./e2e/...
rm -f ./idproxy
"""

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.lint]
description = "Run vet + test"
depends = ["vet", "test"]

[tasks.clean]
description = "Remove build artifacts"
run = "rm -f idproxy"

# ── DynamoDB Store (STORE_BACKEND=dynamodb) ───────────────────────────────────

[tasks."dynamodb:create"]
description = "Create DynamoDB table for idproxy Store with TTL"
run = """
: "${DYNAMODB_TABLE_NAME:?set DYNAMODB_TABLE_NAME in .env}"
aws dynamodb create-table \
  --region "${AWS_REGION}" \
  --table-name "${DYNAMODB_TABLE_NAME}" \
  --attribute-definitions AttributeName=pk,AttributeType=S \
  --key-schema AttributeName=pk,KeyType=HASH \
  --billing-mode PAY_PER_REQUEST
aws dynamodb wait table-exists \
  --region "${AWS_REGION}" \
  --table-name "${DYNAMODB_TABLE_NAME}"
aws dynamodb update-time-to-live \
  --region "${AWS_REGION}" \
  --table-name "${DYNAMODB_TABLE_NAME}" \
  --time-to-live-specification "Enabled=true,AttributeName=ttl"
echo "Table ${DYNAMODB_TABLE_NAME} created in ${AWS_REGION} with TTL enabled."
"""

[tasks."dynamodb:delete"]
description = "Delete DynamoDB idproxy Store table (destructive)"
run = """
: "${DYNAMODB_TABLE_NAME:?set DYNAMODB_TABLE_NAME in .env}"
aws dynamodb delete-table \
  --region "${AWS_REGION}" \
  --table-name "${DYNAMODB_TABLE_NAME}"
echo "Table ${DYNAMODB_TABLE_NAME} deletion requested."
"""
