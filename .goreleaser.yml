version: 2

project_name: idproxy

builds:
  - main: ./cmd/idproxy
    binary: idproxy
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - Merge pull request

brews:
  - name: idproxy
    repository:
      owner: youyo
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/youyo/idproxy"
    description: "idproxy - Identity-aware reverse proxy with OAuth 2.1"
    license: "MIT"
    install: |
      bin.install "idproxy"
    test: |
      system "#{bin}/idproxy", "--help"
